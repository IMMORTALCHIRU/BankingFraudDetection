{% extends "base.html" %}
{% block title %}Reset Password — BankGuard{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-bg-overlay"></div>
<div class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height:100vh;padding:1rem;">
  <div style="width:100%;max-width:440px;position:relative;z-index:2;">
    <div class="card border-0 shadow-xl rounded-5 overflow-hidden">
      <div class="text-white text-center py-5 px-4 position-relative" style="background:var(--grad-dark);">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(79,70,229,0.3) 0%,transparent 70%);"></div>
        <div class="position-relative" style="z-index:2;">
          <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:70px;height:70px;background:var(--grad-primary);border-radius:50%;box-shadow:0 8px 24px rgba(79,70,229,0.5);">
            <i class="bi bi-shield-lock-fill" style="font-size:1.8rem;"></i>
          </div>
          <h3 class="fw-black mb-1" style="font-family:'Plus Jakarta Sans',sans-serif;">Reset Password</h3>
          <p style="opacity:0.65;font-size:0.875rem;margin:0;">OTP sent to <strong>{{ email }}</strong></p>
        </div>
      </div>
      <div class="card-body p-4 p-md-5 bg-white">
        <form method="POST" action="{{ url_for('auth.reset_password') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-3">
            <label class="form-label">OTP Code</label>
            <input type="text" name="otp" class="form-control text-center fw-bold fs-5"
                   style="letter-spacing:0.5rem;" maxlength="4" placeholder="- - - -" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" name="new_password" id="newPass" class="form-control" placeholder="Min 8 characters" required/>
              <span class="input-group-text" style="cursor:pointer;" onclick="togglePassword('newPass', this)"><i class="bi bi-eye text-muted"></i></span>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
              <input type="password" name="confirm_password" id="confirmPass" class="form-control" placeholder="Repeat password" required/>
              <span class="input-group-text" style="cursor:pointer;" onclick="togglePassword('confirmPass', this)"><i class="bi bi-eye text-muted"></i></span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-pill">
            <i class="bi bi-check-circle me-2"></i>Reset Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
