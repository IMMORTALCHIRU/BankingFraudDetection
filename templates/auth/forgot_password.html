{% extends "base.html" %}
{% block title %}Forgot Password — BankGuard{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-bg-overlay"></div>
<div class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height:100vh;padding:1rem;">
  <div style="width:100%;max-width:420px;position:relative;z-index:2;">
    <div class="card border-0 shadow-xl rounded-5 overflow-hidden">
      <div class="text-white text-center py-5 px-4 position-relative" style="background:var(--grad-dark);">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,158,11,0.25) 0%,transparent 70%);"></div>
        <div class="position-relative" style="z-index:2;">
          <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width:70px;height:70px;background:var(--grad-warning);border-radius:50%;box-shadow:0 8px 24px rgba(245,158,11,0.4);">
            <i class="bi bi-key-fill" style="font-size:1.8rem;color:#1e1b4b;"></i>
          </div>
          <h3 class="fw-black mb-1" style="font-family:'Plus Jakarta Sans',sans-serif;">Forgot Password?</h3>
          <p style="opacity:0.65;font-size:0.875rem;margin:0;">Enter your email to receive a reset OTP</p>
        </div>
      </div>
      <div class="card-body p-4 p-md-5 bg-white">
        <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="mb-4">
            <label class="form-label">Registered Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-pill">
            <i class="bi bi-send me-2"></i>Send Reset OTP
          </button>
        </form>
        <div class="text-center mt-4">
          <a href="{{ url_for('auth.login') }}" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
